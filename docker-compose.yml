services:
  php:
    build:
      context: .
    container_name: php_app
    environment:
      SERVER_NAME: localhost
      WORKER_COUNT: 4
      CADDY_LOG_LEVEL: INFO
    volumes:
      - ./src:/var/www/html
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis_app
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
